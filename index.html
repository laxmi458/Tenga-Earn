function TaskTimer({duration,onComplete}){
  const[rem,setRem]=useState(duration);
  const[done,setDone]=useState(false);
  useEffect(()=>{if(rem<=0){setDone(true);onComplete();return;}const t=setTimeout(()=>setRem(r=>r-1),1000);return()=>clearTimeout(t);},[rem]);
  const pct=((duration-rem)/duration)*100;
  return <div className="timer-wrap"><svg viewBox="0 0 36 36" width="64" height="64"><circle cx="18" cy="18" r="15.9" fill="none" stroke="#1e2d3d" strokeWidth="3"/><circle cx="18" cy="18" r="15.9" fill="none" stroke={done?"#00d4aa":"#f59e0b"} strokeWidth="3" strokeDasharray="100" strokeDashoffset={100-pct} strokeLinecap="round" style={{transform:"rotate(-90deg)",transformOrigin:"50% 50%",transition:"stroke-dashoffset 1s linear"}}/><text x="18" y="22" textAnchor="middle" fill={done?"#00d4aa":"#f59e0b"} fontSize="8" fontWeight="bold">{done?"✓":rem+"s"}</text></svg></div>;
}

function TaskModal({task,onClose,onReward}){
  const[done,setDone]=useState(task.timer===0);
  const[rewarded,setRewarded]=useState(false);
  const claim=()=>{if(!rewarded&&done){setRewarded(true);onReward(task.reward);}};
  const typeIcons={video:"video",web:"web",app:"apps",ad:"ads"};
  return <div className="modal-overlay" onClick={onClose}><div className="modal-box" onClick={e=>e.stopPropagation()}><div className="modal-header"><span className="modal-title">{task.title}</span><button className="icon-btn" onClick={onClose}><I name="x" size={18}/></button></div><div className="task-preview"><div className="video-placeholder"><I name={typeIcons[task.type]||"video"} size={40} style={{color:"#00d4aa"}}/><p>{task.type==="app"?"Download App":"Content"}</p>{task.timer>0&&<p className="sub-text">Stay {task.timer}s to earn</p>}</div></div><div className="modal-footer">{task.timer>0&&!done&&<TaskTimer duration={task.timer} onComplete={()=>setDone(true)}/>}{(done||task.timer===0)&&<button className={`claim-btn ${rewarded?"claimed":""}`} onClick={claim} disabled={rewarded}>{rewarded?<><I name="check" size={16}/> Claimed!</>:<>Claim +{task.reward} TCOIN</>}</button>}</div></div></div>;
}

  const[show,setShow]=useState(false);
  const[form,setForm]=useState({type:"video",title:"",url:"",reward:10,timer:15});
  const add=()=>{if(!form.title||!form.url){notify("Fill fields","error");return;}setTasks(t=>({...t,[form.type]:[...(t[form.type]||[]),{...form,id:Date.now(),reward:+form.reward,timer:+form.timer}]}));notify("Task added!");setShow(false);};
  const del=(type,id)=>{setTasks(t=>({...t,[type]:t[type].filter(x=>x.id!==id)}));notify("Deleted");};
  return <div className="admin-section">
    <div className="admin-section-header"><h2 className="admin-title" style={{marginBottom:0}}>Content</h2><button className="accent-btn-sm" onClick={()=>setShow(v=>!v)}><I name={show?"x":"plus"} size={16}/>{show?"Cancel":"Add Task"}</button></div>
    {show&&<div className="admin-form-card" style={{marginBottom:16}}><div className="form-row"><div className="form-group"><label>Type</label><select className="input" value={form.type} onChange={e=>setForm({...form,type:e.target.value})}><option value="video">Video</option><option value="web">Web</option><option value="apps">App</option><option value="ads">Ad</option></select></div><div className="form-group"><label>Title</label><input className="input" placeholder="Task title" value={form.title} onChange={e=>setForm({...form,title:e.target.value})}/></div></div><div className="form-group"><label>URL</label><input className="input" placeholder="https://..." value={form.url} onChange={e=>setForm({...form,url:e.target.value})}/></div><div className="form-row"><div className="form-group"><label>Reward</label><input className="input" type="number" value={form.reward} onChange={e=>setForm({...form,reward:e.target.value})}/></div><div className="form-group"><label>Timer (s)</label><input className="input" type="number" value={form.timer} onChange={e=>setForm({...form,timer:e.target.value})}/></div></div><button className="primary-btn" onClick={add}>Add →</button></div>}
    {Object.entries(tasks).map(([type,list])=><div key={type} className="admin-card" style={{marginBottom:14}}><h3 style={{textTransform:"capitalize",marginBottom:12}}>{type} <span className="badge">{list.length}</span></h3>{list.map(t=><div key={t.id} className="admin-list-row"><div style={{flex:1}}><div style={{fontSize:13,fontWeight:600}}>{t.title}</div><div className="sub-text">+{t.reward}T · {t.timer}s</div></div><button className="danger-btn-sm" onClick={()=>del(type,t.id)}><I name="x" size={14}/></button></div>)}</div>)}
  </div>;
}

function AdminUsers({users,setUsers,notify}){
  const toggle=(id)=>{setUsers(u=>u.map(x=>x.id===id?{...x,status:x.status==="banned"?"active":"banned"}:x));notify("Updated");};
  const editBal=(id,d)=>{setUsers(u=>u.map(x=>x.id===id?{...x,balance:Math.max(0,x.balance+d)}:x));notify("Balance updated");};
  return <div className="admin-section"><h2 className="admin-title">Users</h2><div className="admin-card">{users.map(u=><div key={u.id} className="admin-user-row"><div className="ref-avatar" style={{fontSize:12}}>{u.name[0]}</div><div style={{flex:1}}><div style={{fontWeight:600,fontSize:13}}>{u.name}</div><div className="sub-text">{u.email}</div></div><div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}><span className="reward-val">{u.balance}T</span><button className="sm-btn accent" onClick={()=>editBal(u.id,50)}>+50</button><button className="sm-btn danger" onClick={()=>editBal(u.id,-50)}>-50</button><button className={`sm-btn ${u.status==="banned"?"accent":"danger"}`} onClick={()=>toggle(u.id)}>{u.status==="banned"?"Unban":"Ban"}</button></div></div>)}</div></div>;
}

function AdminWithdrawals({withdrawals,setWithdrawals,notify}){
  const update=(id,s)=>{setWithdrawals(w=>w.map(x=>x.id===id?{...x,status:s}:x));notify(`Withdrawal ${s}`);};
  const sc={pending:"#f59e0b",approved:"#00d4aa",rejected:"#ef4444"};
  return <div className="admin-section"><h2 className="admin-title">Withdrawals</h2><div className="admin-card">{withdrawals.map(w=><div key={w.id} className="admin-list-row" style={{alignItems:"flex-start"}}><div style={{flex:1}}><div style={{fontWeight:600,fontSize:13}}>{w.user}</div><div className="sub-text">{w.method} · {w.account}</div><div style={{marginTop:4,display:"flex",gap:8,alignItems:"center"}}><span className="reward-val">{w.amount}T</span><span className="status-badge" style={{background:sc[w.status]+"22",color:sc[w.status]}}>{w.status}</span></div></div>{w.status==="pending"&&<div style={{display:"flex",gap:8}}><button className="sm-btn accent" onClick={()=>update(w.id,"approved")}>Approve</button><button className="sm-btn danger" onClick={()=>update(w.id,"rejected")}>Reject</button></div>}</div>)}</div></div>;
}

function AdminCampaigns({campaigns,setCampaigns,notify}){
  const update=(id,s)=>{setCampaigns(c=>c.map(x=>x.id===id?{...x,status:s}:x));notify(`Campaign ${s}`);};
  const sc={active:"#00d4aa",pending:"#f59e0b",completed:"#6366f1",rejected:"#ef4444"};
  return <div className="admin-section"><h2 className="admin-title">Campaigns</h2><div className="admin-card">{campaigns.map(c=><div key={c.id} className="admin-list-row" style={{alignItems:"flex-start"}}><div style={{flex:1}}><div style={{display:"flex",gap:8,alignItems:"center",marginBottom:4}}><span style={{fontWeight:600,fontSize:13}}>{c.title}</span><span className="status-badge" style={{background:sc[c.status]+"22",color:sc[c.status]}}>{c.status}</span></div><div className="sub-text">{c.user} · {c.type} · ${c.budget} budget</div><div className="progress-bar" style={{marginTop:8}}><div className="progress-fill" style={{width:`${(c.completed/c.target)*100}%`}}/></div><div className="sub-text">{c.completed}/{c.target}</div></div>{c.status==="pending"&&<div style={{display:"flex",gap:8}}><button className="sm-btn accent" onClick={()=>update(c.id,"active")}>Approve</button><button className="sm-btn danger" onClick={()=>update(c.id,"rejected")}>Reject</button></div>}</div>)}</div></div>;
}

function AuthScreen({onLogin}){
  const[mode,setMode]=useState("login");
  const[form,setForm]=useState({name:"",email:"",password:"",ref:""});
  const[err,setErr]=useState("");
  const submit=()=>{
    if(!form.email||!form.password){setErr("Fill all fields");return;}
    if(form.email==="admin@tcoin.app"&&form.password==="admin123"){onLogin({role:"admin"});return;}
    onLogin({role:"user",name:form.name||"Demo User",email:form.email,balance:500,ref_code:"TCOIN"+Math.floor(10000+Math.random()*90000),total_earned:500,today_earned:50});
  };
  return <div className="auth-screen"><div className="auth-bg"/>
    <div className="auth-card">
      <div className="auth-logo"><div className="auth-logo-icon">T</div><span>TCOIN</span></div>
      <p className="auth-tagline">Earn crypto doing simple tasks</p>
      <div className="auth-tabs"><button className={mode==="login"?"active":""} onClick={()=>setMode("login")}>Login</button><button className={mode==="register"?"active":""} onClick={()=>setMode("register")}>Register</button></div>
      {mode==="register"&&<div className="form-group"><input className="input" placeholder="Full Name" value={form.name} onChange={e=>setForm({...form,name:e.target.value})}/></div>}
      <div className="form-group"><input className="input" type="email" placeholder="Email" value={form.email} onChange={e=>setForm({...form,email:e.target.value})}/></div>
      <div className="form-group"><input className="input" type="password" placeholder="Password" value={form.password} onChange={e=>setForm({...form,password:e.target.value})}/></div>
      {mode==="register"&&<div className="form-group"><input className="input" placeholder="Referral code (optional)" value={form.ref} onChange={e=>setForm({...form,ref:e.target.value})}/></div>}
      {err&&<p className="auth-err">{err}</p>}
      <button className="primary-btn" onClick={submit}>{mode==="login"?"Sign In →":"Create Account →"}</button>
      <div className="auth-hint"><I name="admin" size={13}/> Admin: admin@tcoin.app / admin123</div>
    </div>
  </div>;
}

function App(){
  const[session,setSession]=useState(null);
  const setUser=(updater)=>setSession(s=>({...s,...(typeof updater==="function"?updater(s):updater)}));
  if(!session)return <AuthScreen onLogin={setSession}/>;
  if(session.role==="admin")return <AdminPanel onLogout={()=>setSession(null)}/>;
  return <UserPanel user={session} onLogout={()=>setSession(null)} setUser={setUser}/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
